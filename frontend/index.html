<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>选品Agent</title>
  <link rel="stylesheet" href="./src/styles/base.css">
  <link rel="stylesheet" href="./src/styles/product-agent.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
  <main class="app-shell">
    <section class="agent-pane" aria-label="选品助手输入区">
      <div class="agent-intro">
        <h1 class="agent-title">选品Agent</h1>
        <p class="agent-subtitle">跨境电商选品Agent助手，帮你找出“值得做的产品”</p>
      </div>

      <div class="composer-wrap">
        <div class="quick-tabs" aria-label="快捷工具">
          <span>提示词生成</span>
          <button id="productToolTab" class="quick-tab is-active" type="button">选品工具</button>
          <button class="quick-tab" type="button">对标选品</button>
          <button class="quick-tab" type="button">选品方法</button>
        </div>

        <section id="productToolPanel" class="tool-panel" aria-label="选品工具参数面板" hidden>
          <header class="tool-panel-header">
            <h2>选品工具</h2>
            <button id="closeProductToolBtn" class="icon-btn" type="button" title="关闭" aria-label="关闭选品工具">
              <i data-lucide="x" width="16" height="16"></i>
            </button>
          </header>

          <div class="tool-panel-body">
            <div class="tool-field">
              <label>场景</label>
              <div class="scene-tabs" role="tablist" aria-label="选品场景">
                <button class="scene-tab is-active" type="button" data-scene="产品">产品</button>
                <button class="scene-tab" type="button" data-scene="关键词">关键词</button>
                <button class="scene-tab" type="button" data-scene="市场">市场</button>
                <button class="scene-tab" type="button" data-scene="评论">评论</button>
                <button class="scene-tab" type="button" data-scene="合规">合规</button>
                <button class="scene-tab" type="button" data-scene="其他">其他</button>
              </div>
            </div>

            <div class="tool-grid">
              <div class="tool-field">
                <label for="toolPlatform">平台</label>
                <select id="toolPlatform">
                  <option value="TikTok Shop">TikTok Shop</option>
                  <option value="Amazon">Amazon</option>
                  <option value="Shopify">Shopify</option>
                </select>
              </div>
              <div class="tool-field">
                <label for="toolRegion">站点</label>
                <select id="toolRegion">
                  <option value="美国">美国</option>
                  <option value="英国">英国</option>
                  <option value="泰国">泰国</option>
                  <option value="越南">越南</option>
                  <option value="马来西亚">马来西亚</option>
                  <option value="菲律宾">菲律宾</option>
                  <option value="新加坡">新加坡</option>
                  <option value="印尼">印尼</option>
                </select>
              </div>
            </div>

            <div class="tool-field">
              <label for="toolName">工具</label>
              <select id="toolName">
                <option value="EchoTik-TikTok商品搜索">EchoTik-TikTok商品搜索</option>
              </select>
            </div>

            <div class="tool-field">
              <label for="toolKeyword">商品关键词</label>
              <input id="toolKeyword" type="text" value="公路自行车" placeholder="请输入商品关键词">
            </div>

            <div class="tool-field category-field">
              <label for="categoryTrigger">商品分类</label>
              <button id="categoryTrigger" class="category-trigger" type="button" aria-expanded="false">
                <span id="categoryTags" class="category-tags"></span>
                <span class="category-placeholder">可选，不选则覆盖全部类目</span>
                <i data-lucide="chevron-down" width="16" height="16"></i>
              </button>
              <div id="categoryMenu" class="category-menu" hidden>
                <div id="categoryOptions" class="category-options"></div>
                <div class="category-footer">
                  <span id="categoryCount">已选 0 个</span>
                  <div class="category-actions">
                    <button id="clearCategoryBtn" type="button">清空</button>
                    <button id="confirmCategoryBtn" type="button">确认</button>
                  </div>
                </div>
              </div>
            </div>

            <div class="tool-grid compact">
              <div class="tool-field">
                <label for="toolSortBy">排序字段</label>
                <select id="toolSortBy">
                  <option value="总销量">总销量</option>
                  <option value="总GMV">总GMV</option>
                  <option value="近30天销量">近30天销量</option>
                  <option value="近7天销量">近7天销量</option>
                  <option value="SKU均价">SKU均价</option>
                </select>
              </div>
              <div class="tool-field">
                <label for="toolSortOrder">排序方式</label>
                <select id="toolSortOrder">
                  <option value="降序">降序</option>
                  <option value="升序">升序</option>
                </select>
              </div>
              <div class="tool-field">
                <label for="toolPage">页码</label>
                <input id="toolPage" type="number" min="1" value="1">
              </div>
              <div class="tool-field">
                <label for="toolPageSize">每页条数</label>
                <input id="toolPageSize" type="number" min="1" value="50">
              </div>
            </div>
          </div>

          <footer class="tool-panel-footer">
            <button id="resetProductToolBtn" class="ghost-btn" type="button">重置</button>
            <button id="generatePromptBtn" class="primary-btn" type="button">生成提示词</button>
          </footer>
        </section>

        <div class="composer">
          <textarea id="promptInput" class="prompt-input" spellcheck="false">@EchoTik-TikTok商品搜索 在 TikTok Shop，美国站，商品关键词 自行车，商品分类 运动与户外，按 总销量 排序，排序方式 降序，第 1 页，每页 50 条。</textarea>
          <div class="composer-tools">
            <div class="tool-left">
              <button class="icon-btn" type="button" title="添加附件" aria-label="添加附件">
                <i data-lucide="plus" width="17" height="17"></i>
              </button>
            </div>
            <div class="tool-right">
              <button class="agent-select" type="button">
                选品Agent
                <i data-lucide="chevron-down" width="14" height="14"></i>
              </button>
              <button id="runBtn" class="send-btn" type="button" title="执行查询" aria-label="执行查询">
                <i data-lucide="arrow-up" width="18" height="18"></i>
              </button>
            </div>
          </div>
        </div>

        <div class="bottom-nav">
          <span><i data-lucide="book-open" width="13" height="13"></i>词库</span>
          <span><i data-lucide="briefcase-business" width="13" height="13"></i>商品库</span>
          <span><i data-lucide="blocks" width="13" height="13"></i>技能</span>
        </div>
        <p class="ai-note">页面为前端原型，真实数据接口待需求确认后接入</p>
      </div>
    </section>

    <section class="workspace" aria-label="候选产品工作区">
      <div class="workspace-header">选品Agent</div>

      <div class="product-surface">
        <div class="surface-tabs">
          <div class="tab-title">候选产品</div>
          <div class="surface-actions">
            <button id="addSelectedBtn" class="ghost-btn" type="button">
              <i data-lucide="plus" width="16" height="16"></i>
              加入候选产品
            </button>
            <button id="clearBtn" class="icon-btn" type="button" title="清空列表" aria-label="清空列表">
              <i data-lucide="trash-2" width="16" height="16"></i>
            </button>
            <button class="icon-btn" type="button" title="全屏" aria-label="全屏">
              <i data-lucide="maximize-2" width="16" height="16"></i>
            </button>
          </div>
        </div>

        <div class="filters">
          <div class="field">
            <label for="timeFilter">加入时间</label>
            <select id="timeFilter">
              <option value="all">全部</option>
              <option value="today">今天</option>
              <option value="7d">近 7 天</option>
            </select>
          </div>
          <div class="field">
            <label for="statusFilter">状态</label>
            <select id="statusFilter">
              <option value="all">全部</option>
              <option value="pending">待定</option>
              <option value="saved">已加入</option>
            </select>
          </div>
          <div class="field">
            <label for="keywordFilter">关键词</label>
            <input id="keywordFilter" type="search" placeholder="输入商品名或关键词">
          </div>
        </div>

        <div class="advanced-row">
          <button class="advanced-toggle" type="button">
            高级筛选
            <i data-lucide="chevron-right" width="15" height="15"></i>
          </button>
          <div class="query-preview">
            <span>识别参数</span>
            <div id="chipList" class="chip-list"></div>
          </div>
        </div>

        <div class="table-section">
          <div class="section-heading">
            <h2>产品列表</h2>
            <div class="summary">
              <span id="resultCount">0 个产品</span>
              <span class="dot"></span>
              <span id="candidateCount">0 个已加入候选</span>
            </div>
          </div>

          <div id="emptyState" class="empty">
            <div>
              <strong>还没有产品数据</strong><br>
              在左侧输入提示词后点击发送，页面会先用模拟数据展示查询结果。
            </div>
          </div>

          <div class="table-wrap">
            <table aria-label="候选产品列表">
              <colgroup>
                <col class="col-check">
                <col class="col-image">
                <col class="col-title">
                <col class="col-id">
                <col class="col-platform">
                <col class="col-status">
                <col class="col-sales">
                <col class="col-sales-30d">
                <col class="col-price">
                <col class="col-rating">
                <col class="col-keyword">
                <col class="col-time">
                <col class="col-actions">
              </colgroup>
              <thead>
                <tr>
                  <th class="check-cell"><input id="selectAll" type="checkbox" aria-label="全选"></th>
                  <th>主图</th>
                  <th>标题</th>
                  <th>商品编号</th>
                  <th>平台</th>
                  <th>状态</th>
                  <th>总销量 ↓</th>
                  <th>30天销量</th>
                  <th>均价</th>
                  <th>评分</th>
                  <th>关键词</th>
                  <th>加入时间</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="productBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="toast" class="toast" role="status">
    <i data-lucide="check-circle-2" width="17" height="17"></i>
    <span id="toastText">已更新</span>
  </div>

  <script src="./src/scripts/mock-products.js"></script>
  <script src="./src/scripts/prompt-parser.js"></script>
  <script src="./src/scripts/prompt-builder.js"></script>
  <script src="./src/scripts/product-agent.js"></script>
</body>
</html>
